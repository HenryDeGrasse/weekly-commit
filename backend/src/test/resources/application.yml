spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=KEY;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false

ai:
  enabled: true
  provider: stub
  openrouter:
    api-key: ""
    model: test-model
    max-tokens: 256
    base-url: http://localhost:0
  pinecone:
    api-key: ""
    index-name: weekly-commit-test
    environment: us-east-1
  embedding:
    model: openai/text-embedding-3-small
    dimensions: 1536
