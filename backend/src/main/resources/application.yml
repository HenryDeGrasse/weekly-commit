spring:
  application:
    name: weekly-commit
  datasource:
    url: jdbc:postgresql://localhost:5432/weekly_commit
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none   # Flyway owns the schema; Hibernate should not re-validate it
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

# ── OpenAPI / Swagger UI ───────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs               # JSON spec at /api-docs
  swagger-ui:
    path: /swagger-ui.html        # UI at /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Actuator & Observability ───────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ── Feature Flags ──────────────────────────────────────────────
app:
  scheduling:
    enabled: ${APP_SCHEDULING_ENABLED:true}
  features:
    ai-assistance: ${FEATURE_AI_ASSISTANCE:true}
    notifications: ${FEATURE_NOTIFICATIONS:true}

# ── AI Provider ────────────────────────────────────────────────
ai:
  enabled: ${FEATURE_AI_ASSISTANCE:true}
  provider: ${AI_PROVIDER:openrouter}   # "openrouter" or "stub"
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openai/gpt-4.1-nano}
    max-tokens: ${OPENROUTER_MAX_TOKENS:1024}
    base-url: https://openrouter.ai/api/v1
  voyage:
    api-key: ${VOYAGE_API_KEY:}
    base-url: https://api.voyageai.com/v1
  rerank:
    enabled: true
    api-key: ${COHERE_API_KEY:}
    top-n: 20
  pinecone:
    api-key: ${PINECONE_API_KEY:}
    index-name: ${PINECONE_INDEX_NAME:weekly-commit}
    environment: ${PINECONE_ENVIRONMENT:us-east-1}
    voyage-index-name: ${PINECONE_VOYAGE_INDEX_NAME:weekly-commit-voyage}
    voyage-dimensions: ${PINECONE_VOYAGE_DIMENSIONS:1024}
  embedding:
    model: voyage-4
    dimensions: 1024
  experiments:
    experiments:
      embedding-model:
        enabled: true          # A/B test: OpenAI text-embedding-3-small vs Voyage voyage-4
        control-weight: 0.5    # 50/50 split
        control-value: openai/text-embedding-3-small
        treatment-value: voyage-4
      llm-model:
        enabled: false
        control-weight: 1.0
        control-value: openai/gpt-4.1-nano
        treatment-value: google/gemini-2.5-flash-preview
        applies-to:
          - COMMIT_LINT
          - RAG_INTENT
          - RAG_QUERY
      hyde:
        enabled: false         # HyDE is now conditional — auto-triggers on LOW/INSUFFICIENT retrieval
        control-weight: 1.0
        control-value: disabled
        treatment-value: enabled
        applies-to:
          - RAG_QUERY
