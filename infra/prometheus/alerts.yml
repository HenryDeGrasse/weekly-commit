# Alerting rules for Weekly Commit
groups:
  - name: weekly-commit-alerts
    rules:
      # ── API health ──────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate (>5%)"
          description: "{{ $labels.uri }} is returning >5% server errors over the last 5 minutes."

      - alert: SlowEndpoint
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API endpoint (p95 > 2s)"
          description: "{{ $labels.uri }} p95 latency is {{ $value }}s."

      # ── Lifecycle jobs ──────────────────────────────────────────
      - alert: AutoLockJobFailure
        expr: increase(auto_lock_failures_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Auto-lock job failed for one or more plans"

      - alert: AutoReconcileJobFailure
        expr: increase(auto_reconcile_failures_total[15m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Auto-reconcile job failed for one or more plans"

      # ── Database ────────────────────────────────────────────────
      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HikariCP connection pool >90% utilized"

      # ── JVM ─────────────────────────────────────────────────────
      - alert: HighJvmMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage >85%"

      # ── AI Quality (Phase 4c) ──────────────────────────────────
      # Thresholds from Manus RAG Evaluation Research Report §8
      - alert: AiFaithfulnessLow
        expr: weekly_commit_ai_faithfulness_score < 0.88
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "AI faithfulness score below 0.88 ({{ $labels.suggestion_type }})"
          description: "Rolling 7-day faithfulness is {{ $value }}. Production threshold is 0.88 (Manus §8). Investigate prompt quality or retrieval drift."

      - alert: AiFaithfulnessCritical
        expr: weekly_commit_ai_faithfulness_score < 0.85
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "AI faithfulness CRITICAL — below 0.85 ({{ $labels.suggestion_type }})"
          description: "Rolling 7-day faithfulness is {{ $value }}. Below development gate threshold (Manus §8). AI outputs may contain hallucinated content."

      - alert: AiAcceptanceRateLow
        expr: weekly_commit_ai_acceptance_rate < 0.20
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "AI suggestion acceptance rate below 20% ({{ $labels.suggestion_type }})"
          description: "Users are dismissing >80% of {{ $labels.suggestion_type }} suggestions. Consider disabling this suggestion type or improving the prompt."

      - alert: AiProviderDown
        expr: weekly_commit_ai_provider_available == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AI provider unavailable for >5 minutes"
          description: "The OpenRouter AI provider is unreachable. All AI features are degraded but core planning workflow is unaffected (PRD §FR-12)."
